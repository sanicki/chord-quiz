name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - claude/android-chord-quiz-app-1UpN6

jobs:
  build:
    name: Build ${{ inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Build debug APK
        if: ${{ (inputs.build_type || 'debug') == 'debug' }}
        run: |
          gradle assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "## Gradle Output (last 80 lines)" >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          exit $BUILD_EXIT
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build release APK (unsigned)
        if: ${{ (inputs.build_type || 'debug') == 'release' }}
        run: gradle assembleRelease --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload debug APK
        if: ${{ (inputs.build_type || 'debug') == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: chord-quiz-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        if: ${{ (inputs.build_type || 'debug') == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: chord-quiz-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
